<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Task - To Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Simple Todo List</h1>
    <p class="info">💡 Double-click a task to edit it</p>
    <!-- Input and button to add new todos -->
    <div>
        <input type="text" id="todo-input" placeholder="Enter a todo and press next or enter">
        <button id="add-btn">Add</button>
    </div>
    
    <ul id="todo-list"></ul>

    <script src="script.js"></script>
</body>
</html>
